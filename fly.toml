app = "legal-champions"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4040"
  DB_PATH = "/data/leads.db"

[[mounts]]
  source = "lc_data"
  destination = "/data"

[http_service]
  internal_port = 4040
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
